---
default:
  interruptible: true

stages:
  - install
  - build
  - generate
  - publish

variables:
  NODE_VERSION: 24-alpine
  SKIP_SIMPLE_GIT_HOOKS: '1'

include:
  - project: devops/pipelines
    ref: node@2.0.0
    file:
      - /node/install.gitlab-ci.yml
      - /node/build.gitlab-ci.yml
      - /node/lint.gitlab-ci.yml
      - /node/run.gitlab-ci.yml

  - project: devops/pipelines
    ref: semantic-release@2.0.0
    file:
      - /semantic-release/publish.gitlab-ci.yml

install:
  stage: install
  extends: .node-install

lint:
  stage: build
  extends: .node-lint

build:
  stage: build
  extends: .node-build
  artifacts:
    paths:
      - dist/**
      - oclif.manifest.json

generate:
  extends: .node-run
  stage: generate
  variables:
    NODE_COMMAND_SCRIPT: start
  artifacts:
    paths:
      - default.json

semantic-release:
  stage: publish
  extends:
    - .semantic-release
  rules:
    - if: '$CI_COMMIT_REF_NAME =~ /^(master|main|alpha|beta|rc|next)$/'
      interruptible: true
    - when: never
